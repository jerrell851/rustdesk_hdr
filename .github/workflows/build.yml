name: Build

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x64]

    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -B build -G "Visual Studio 17 2022" -A ${{ matrix.arch }}

      - name: Build Release
        run: cmake --build build --config Release --verbose

      - name: Rename and copy to root
        shell: pwsh
        run: |
          $exe = Get-ChildItem build -Recurse -Filter RustDeskHdrService.exe | Select-Object -First 1
          if (-not $exe) { Write-Error "EXE not found!"; exit 1 }
          $dst = "RustDeskHdrService-${{ matrix.arch }}.exe"
          Copy-Item $exe.FullName $dst
          Write-Host "Copied to $dst ($((Get-Item $dst).Length) bytes)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RustDeskHdrService-${{ matrix.arch }}
          path: RustDeskHdrService-${{ matrix.arch }}.exe
          if-no-files-found: error
          retention-days: 1

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: RustDeskHdrService-*
          merge-multiple: true
          path: artifacts

      - name: Verify artifacts
        run: ls -la artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.exe
          generate_release_notes: true
